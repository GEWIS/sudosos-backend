name: Publish Client Snapshot

on:
  push:
    branches: [develop]

concurrency:
  group: publish-client-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # Generate swagger spec from backend
      - run: yarn install --frozen-lockfile
      - run: yarn swagger

      # Generate and build client
      - name: Install client dependencies
        working-directory: client
        run: npm install

      - name: Generate and build client
        working-directory: client
        run: npm run genbuild

      - name: Set package version
        working-directory: client
        run: npm version "0.0.0-develop.$(git rev-parse --short HEAD)" --no-git-tag-version

      - name: Publish to npm
        working-directory: client
        run: npm publish --tag develop
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
