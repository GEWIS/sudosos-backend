name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  versioning:
    permissions:
      contents: write
      pull-requests: write
      issues: write
    uses: GEWIS/actions/.github/workflows/versioning.yml@v1
    with:
      node-version: '22.x'

  publish-client:
    runs-on: ubuntu-latest
    needs: versioning
    if: ${{ needs.versioning.outputs['next-version'] != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm swagger

      - name: Install client dependencies
        working-directory: client
        run: npm install

      - name: Generate and build client
        working-directory: client
        run: npm run genbuild

      - name: Set package version
        working-directory: client
        run: npm version "${{ needs.versioning.outputs['next-version'] }}" --no-git-tag-version

      - name: Publish to npm
        working-directory: client
        run: npm publish --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    permissions:
      contents: read
      packages: write
    needs: versioning
    if: ${{ needs.versioning.outputs['next-version'] != '' }}
    uses: GEWIS/actions/.github/workflows/docker-release.yml@v1
    with:
      projects: '["."]'
      docker-paths: '["${{ vars.DOCKER_TAG }}"]'
      docker-registry: ${{ vars.DOCKER_REGISTRY }}
      version: ${{ needs.versioning.outputs['next-version'] }}
    secrets:
      REGISTRY_USERNAME: ${{ secrets.SVC_GH_SUDOSOS_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.SVC_GH_SUDOSOS_PWD }}
