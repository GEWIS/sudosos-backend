apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - sealed-backend-env.yaml

patches:
  - path: patches/ingress.yaml
    target:
      kind: Ingress
      name: sudosos
  - path: patches/backend-config.yaml

# Test uses develop tags for everything
images:
  - name: abc.docker-registry.gewis.nl/pos/sudosos/backend
    newTag: develop
  - name: abc.docker-registry.gewis.nl/pos/sudosos/dashboard
    newTag: develop
  - name: abc.docker-registry.gewis.nl/pos/sudosos/point-of-sale
    newTag: develop
  - name: abc.docker-registry.gewis.nl/pos/sudosos/docs
    newTag: develop
  - name: abc.docker-registry.gewis.nl/eou/pdf-generator
    newTag: "1.5.1"
