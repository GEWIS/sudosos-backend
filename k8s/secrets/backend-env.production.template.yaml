apiVersion: v1
kind: Secret
metadata:
  name: backend-env
  namespace: sudosos-prod
type: Opaque
stringData:
  # Database credentials
  TYPEORM_HOST: REPLACE_ME
  TYPEORM_DATABASE: REPLACE_ME
  TYPEORM_USERNAME: REPLACE_ME
  TYPEORM_PASSWORD: REPLACE_ME

  # LDAP credentials & filters
  LDAP_SERVER_URL: REPLACE_ME
  LDAP_BASE: REPLACE_ME
  LDAP_USER_BASE: REPLACE_ME
  LDAP_BIND_USER: REPLACE_ME
  LDAP_BIND_PW: REPLACE_ME
  LDAP_USER_FILTER: REPLACE_ME
  LDAP_SHARED_ACCOUNT_FILTER: REPLACE_ME
  LDAP_ROLE_FILTER: REPLACE_ME
  LDAP_SERVICE_ACCOUNT_FILTER: REPLACE_ME

  # Stripe keys (restricted: "Write on webhooks" + "Write on payment intents")
  STRIPE_PUBLIC_KEY: REPLACE_ME
  STRIPE_PRIVATE_KEY: REPLACE_ME
  STRIPE_WEBHOOK_SECRET: REPLACE_ME

  # GEWIS integrations
  GEWISWEB_PUBLIC_TOKEN: REPLACE_ME
  GEWISWEB_JWT_SECRET: REPLACE_ME
  GEWISDB_API_KEY: REPLACE_ME

  # SMTP credentials
  SMTP_HOST: REPLACE_ME
  SMTP_USERNAME: REPLACE_ME
  SMTP_PASSWORD: REPLACE_ME

  # Legacy migration credentials (remove once migration is complete)
  SUSOS_HOST: REPLACE_ME
  SUSOS_PORT: "3306"
  SUSOS_DATABASE: REPLACE_ME
  SUSOS_USERNAME: REPLACE_ME
  SUSOS_PASSWORD: REPLACE_ME
